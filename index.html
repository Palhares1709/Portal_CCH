<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base target="_top">
    <style>
      body { 
    font-family: 'Segoe UI', sans-serif; 
    background: #f4f7f6; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; /* Alterado de height para min-height */
    margin: 0; 
  }
      .login-card { 
    background: white; 
    padding: 25px; 
    border-radius: 10px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
    width: 90%; /* Ocupa quase toda a largura */
    max-width: 500px; /* Não deixa ficar gigante em monitores */
    text-align: center; }
      input { 
    width: 100%; 
    padding: 15px; /* Aumentado para facilitar o toque */
    margin: 20px 0; 
    border: 1px solid #ddd; 
    border-radius: 5px; 
    box-sizing: border-box; 
    font-size: 16px; /* Evita zoom automático no iOS */
  }
      button { 
    width: 100%; 
    padding: 15px; 
    background: #007bff; 
    color: white; 
    border: none; 
    border-radius: 5px; 
    cursor: pointer; 
    font-size: 18px; /* Texto um pouco maior */
  }
      button:hover { background: #0056b3; }
      #mensagem { margin-top: 15px; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h2>Acesso ao Contracheque</h2>
      <input type="email" id="email" placeholder="Digite seu e-mail corporativo">
      <button id="btnEntrar">Entrar</button>
      <div id="mensagem"></div>
    </div>

    <script>
      const URL_DO_SEU_WEB_APP = 'https://script.google.com/macros/s/AKfycbykzQvgEVLyLjnjI_BkMBw6OO8yBisDeewYq8-gu09jyCDu2FjQQVq6l1rUCCcRLY1Gdg/exec';

      document.getElementById('btnEntrar').addEventListener('click', function() {
        const email = document.getElementById('email').value;
        const msg = document.getElementById('mensagem');
        
        if (!email) {
          msg.innerHTML = '<span style="color:red">Por favor, digite seu e-mail.</span>';
          return;
        }

        msg.innerText = "Aguarde, validando seu acesso...";
        
        // Chamada direta para o Google sem o corsproxy.io
        fetch(URL_DO_SEU_WEB_APP + "?email=" + encodeURIComponent(email), {
          method: 'GET',
          mode: 'cors'
        })
          .then(response => response.json())
          .then(res => {
            if (res.status === "ok") {
              msg.innerText = "Acesso autorizado! Redirecionando...";
              window.open(res.url, '_blank');
            } else {
              msg.innerHTML = '<span style="color:red">' + res.msg + '</span>';
            }
          })
          .catch(err => {
            console.error(err);
            msg.innerHTML = '<span style="color:red">Erro de conexão. Verifique se o Web App está publicado.</span>';
          });
      });
    </script>
  </body>
</html>
