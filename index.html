<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base target="_top">
    <style>
      body { 
        font-family: 'Segoe UI', sans-serif; 
        background: #f4f7f6; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        margin: 0; 
      }
      .login-card { 
        background: white; 
        padding: 25px; 
        border-radius: 10px; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        width: 90%; 
        max-width: 500px; 
        text-align: center; 
      }
      input { 
        width: 100%; 
        padding: 15px; 
        margin: 20px 0; 
        border: 1px solid #ddd; 
        border-radius: 5px; 
        box-sizing: border-box; 
        font-size: 16px; 
      }
      button { 
        width: 100%; 
        padding: 15px; 
        background: #007bff; 
        color: white; 
        border: none; 
        border-radius: 5px; 
        cursor: pointer; 
        font-size: 18px; 
      }
      button:hover { background: #0056b3; }
      
      /* Estilo do loader */
      .loader {
        border: 4px solid #f3f3f6;
        border-top: 4px solid #007bff;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 15px auto;
        display: none; 
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      #mensagem { margin-top: 15px; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h2>Acesso ao Contracheque</h2>
      <input type="email" id="email" placeholder="Digite seu e-mail corporativo">
      <button id="btnEntrar">Entrar</button>
      
      <div id="loader" class="loader"></div>
      
      <div id="mensagem"></div>
    </div>

    <script>
      const URL_DO_SEU_WEB_APP = 'https://script.google.com/macros/s/AKfycbykzQvgEVLyLjnjI_BkMBw6OO8yBisDeewYq8-gu09jyCDu2FjQQVq6l1rUCCcRLY1Gdg/exec';

      document.getElementById('btnEntrar').addEventListener('click', function() {
        const email = document.getElementById('email').value;
        const msg = document.getElementById('mensagem');
        const loader = document.getElementById('loader');
        
        if (!email) {
          msg.innerHTML = '<span style="color:red">Por favor, digite seu e-mail.</span>';
          return;
        }

        loader.style.display = "block";
        msg.innerText = "Aguarde, validando seu acesso...";
        
        // Adicionamos um timestamp (t) para evitar cache do navegador
        // Usamos o modo 'no-cors' para ignorar a política de segurança do Google
        fetch(URL_DO_SEU_WEB_APP + "?email=" + encodeURIComponent(email), {
          method: 'GET',
          mode: 'no-cors' 
        })
        .then(() => {
          // Como o modo 'no-cors' bloqueia a leitura do JSON, 
          // exibimos uma mensagem padrão de sucesso.
          loader.style.display = "none";
          msg.innerHTML = '<span style="color:green">Solicitação enviada com sucesso! Verifique seu e-mail.</span>';
        })
        .catch(err => {
          loader.style.display = "none";
          console.error("Erro na requisição:", err);
          msg.innerHTML = '<span style="color:red">Erro ao processar. Tente novamente.</span>';
        });
      });
    </script>
  </body>
</html>
