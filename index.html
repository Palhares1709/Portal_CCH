<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
      .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
      input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
      button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
      button:hover { background: #0056b3; }
      #mensagem { margin-top: 15px; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h2>Acesso ao Contracheque</h2>
      <input type="email" id="email" placeholder="Digite seu e-mail corporativo">
      <button id="btnEntrar">Entrar</button>
      <div id="mensagem"></div>
    </div>

    <script>
      const URL_DO_SEU_WEB_APP = 'https://script.google.com/macros/s/AKfycbykzQvgEVLyLjnjI_BkMBw6OO8yBisDeewYq8-gu09jyCDu2FjQQVq6l1rUCCcRLY1Gdg/exec';

      document.getElementById('btnEntrar').addEventListener('click', function() {
        const email = document.getElementById('email').value;
        const msg = document.getElementById('mensagem');
        
        if (!email) {
          msg.innerHTML = '<span style="color:red">Por favor, digite seu e-mail.</span>';
          return;
        }

        msg.innerText = "Aguarde, validando seu acesso...";
        
        // Chamada direta para o Google sem o corsproxy.io
        fetch(URL_DO_SEU_WEB_APP + "?email=" + encodeURIComponent(email), {
          method: 'GET',
          mode: 'cors'
        })
          .then(response => response.json())
          .then(res => {
            if (res.status === "ok") {
              msg.innerText = "Acesso autorizado! Redirecionando...";
              window.open(res.url, '_blank');
            } else {
              msg.innerHTML = '<span style="color:red">' + res.msg + '</span>';
            }
          })
          .catch(err => {
            console.error(err);
            msg.innerHTML = '<span style="color:red">Erro de conexão. Verifique se o Web App está publicado.</span>';
          });
      });
    </script>
  </body>
</html>
