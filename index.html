<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
      .container { text-align: center; }
      input { padding: 10px; width: 250px; }
      button { padding: 10px 20px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="container">
      <input type="email" id="email" placeholder="Seu e-mail corporativo">
      <button id="btnEntrar">Acessar meu Contracheque</button>
      <div id="mensagem" style="margin-top: 20px;"></div>
    </div>

    <script>
      // COLE AQUI A URL DO SEU WEB APP APÓS A IMPLANTAÇÃO
      const URL_DO_SEU_WEB_APP = 'https://script.google.com/macros/s/AKfycbzmxNZHO1C75zVbJC2Rp38epNnVkH_tcqdf3RZnLoJMoFk3aabnScBtXf0-lORElALdKQ/exec';

      document.getElementById('btnEntrar').addEventListener('click', function() {
        const email = document.getElementById('email').value;
        const msg = document.getElementById('mensagem');
        
        if (!email) { msg.innerText = "Digite o e-mail!"; return; }
        
        msg.innerText = "Validando seu e-mail...";
        
        fetch(URL_DO_SEU_WEB_APP + "?email=" + encodeURIComponent(email))
          .then(response => response.json())
          .then(data => {
            if (data.status === "ok") {
              msg.innerText = "Sucesso! Redirecionando...";
              window.open(data.url, '_blank');
            } else {
              msg.innerHTML = '<span style="color:red">' + data.msg + '</span>';
            }
          })
          .catch(err => {
            msg.innerHTML = '<span style="color:red">Erro na conexão.</span>';
          });
      });
    </script>
  </body>
</html>
